<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 56" width="300" height="56">
  <defs>
    <linearGradient id="em" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8edf5"/>
      <stop offset="100%" stop-color="#c8d0dc"/>
    </linearGradient>
  </defs>

  <!-- ═══════════ MASCOT: Kitsune Fox ═══════════ -->
  <g transform="translate(0, 2)">
    <!-- Left Ear -->
    <path d="M18 22 L12 4 L26 14 Z" fill="url(#em)"/>
    <path d="M19 20 L15 10 L24 16 Z" fill="#0a1f18"/>

    <!-- Right Ear -->
    <path d="M36 22 L42 4 L28 14 Z" fill="url(#em)"/>
    <path d="M35 20 L39 10 L30 16 Z" fill="#0a1f18"/>

    <!-- Head/Face -->
    <ellipse cx="27" cy="28" rx="16" ry="14" fill="url(#em)"/>

    <!-- Light face patch -->
    <ellipse cx="27" cy="30" rx="11" ry="9" fill="#d1fae5"/>

    <!-- Eyes -->
    <ellipse cx="21" cy="27" rx="3.5" ry="4" fill="#064e3b"/>
    <ellipse cx="33" cy="27" rx="3.5" ry="4" fill="#064e3b"/>
    <!-- Eye shine -->
    <circle cx="22.5" cy="25.5" r="1.5" fill="white"/>
    <circle cx="34.5" cy="25.5" r="1.5" fill="white"/>
    <circle cx="20" cy="28" r="0.8" fill="white" opacity="0.5"/>
    <circle cx="32" cy="28" r="0.8" fill="white" opacity="0.5"/>

    <!-- Blush marks -->
    <ellipse cx="16" cy="31" rx="3" ry="1.8" fill="#a7f3d0" opacity="0.6"/>
    <ellipse cx="38" cy="31" rx="3" ry="1.8" fill="#a7f3d0" opacity="0.6"/>

    <!-- Nose -->
    <ellipse cx="27" cy="31.5" rx="1.8" ry="1.2" fill="#064e3b"/>
    <!-- Mouth -->
    <path d="M24 33 Q27 36 30 33" fill="none" stroke="#064e3b" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

    <!-- Whiskers -->
    <line x1="12" y1="28" x2="5" y2="26" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="12" y1="30" x2="4" y2="31" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="12" y1="32" x2="6" y2="35" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="42" y1="28" x2="49" y2="26" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="42" y1="30" x2="50" y2="31" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
    <line x1="42" y1="32" x2="48" y2="35" stroke="#10b981" stroke-width="1" stroke-linecap="round" opacity="0.6"/>

    <!-- Forehead play button marking -->
    <polygon points="27,19 24,25 30,25" fill="#059669" opacity="0.7"/>

    <!-- Subtle glow behind mascot -->
    <ellipse cx="27" cy="30" rx="22" ry="20" fill="url(#em)" opacity="0.08"/>
  </g>

  <!-- ═══════════ TEXT: KaiStream with style ═══════════ -->
  <g transform="translate(62, 0)">
    <!-- Decorative vertical accent bar -->
    <rect x="-4" y="4" width="3" height="48" rx="1.5" fill="url(#em)" opacity="0.6"/>

    <!-- "Kai" - Clean bold system font rendered beautifully -->
    <text x="10" y="39" font-family="Arial, Helvetica, sans-serif"
          font-size="32" font-weight="800" fill="url(#txt)" letter-spacing="1">
      K
    </text>
    <text x="42" y="39" font-family="Arial, Helvetica, sans-serif"
          font-size="32" font-weight="800" fill="url(#em)" letter-spacing="1">
      a
    </text>
    <text x="70" y="39" font-family="Arial, Helvetica, sans-serif"
          font-size="32" font-weight="800" fill="url(#txt)" letter-spacing="1">
      i
    </text>

    <!-- "Stream" - slightly lighter, still bold -->
    <text x="94" y="39" font-family="Arial, Helvetica, sans-serif"
          font-size="32" font-weight="700" fill="#8899b0" letter-spacing="2">
      Stream
    </text>

    <!-- Decorative emerald dot under the text -->
    <circle cx="10" cy="48" r="3" fill="url(#em)" opacity="0.8"/>
    <circle cx="22" cy="48" r="3" fill="url(#em)" opacity="0.5"/>
    <circle cx="34" cy="48" r="3" fill="url(#em)" opacity="0.2"/>
  </g>
</svg>
