<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Left Ear -->
  <path d="M12 30 L6 6 L22 18 Z" fill="url(#fg)"/>
  <path d="M13 28 L9 14 L20 20 Z" fill="#0a1f18"/>

  <!-- Right Ear -->
  <path d="M38 30 L44 6 L28 18 Z" fill="url(#fg)"/>
  <path d="M37 28 L41 14 L30 20 Z" fill="#0a1f18"/>

  <!-- Head/Face -->
  <ellipse cx="26" cy="36" rx="18" ry="16" fill="url(#fg)"/>

  <!-- Light face patch -->
  <ellipse cx="26" cy="38" rx="13" ry="11" fill="#d1fae5"/>

  <!-- Eyes -->
  <ellipse cx="19" cy="35" rx="3.5" ry="4" fill="#064e3b"/>
  <ellipse cx="33" cy="35" rx="3.5" ry="4" fill="#064e3b"/>
  <!-- Eye shine -->
  <circle cx="20.5" cy="33.5" r="1.5" fill="white"/>
  <circle cx="34.5" cy="33.5" r="1.5" fill="white"/>
  <circle cx="18" cy="36" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="32" cy="36" r="0.8" fill="white" opacity="0.5"/>

  <!-- Blush -->
  <ellipse cx="14" cy="40" rx="3" ry="2" fill="#a7f3d0" opacity="0.5"/>
  <ellipse cx="38" cy="40" rx="3" ry="2" fill="#a7f3d0" opacity="0.5"/>

  <!-- Nose -->
  <ellipse cx="26" cy="40" rx="2" ry="1.5" fill="#064e3b"/>

  <!-- Whiskers -->
  <line x1="10" y1="37" x2="4" y2="35" stroke="#10b981" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="10" y1="39" x2="4" y2="40" stroke="#10b981" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="42" y1="37" x2="48" y2="35" stroke="#10b981" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="42" y1="39" x2="48" y2="40" stroke="#10b981" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

  <!-- Play button marking -->
